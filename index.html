<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <title>Reels</title>
  <style>
    :root { --accent: #FEAE0E; --like: #2ecc71; --nope: #ff3b5c; }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      height: 100%; background: #000; color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden; overscroll-behavior: none;
    }

    /* Vertical paging feed — native scroll-snap on the compositor thread */
    #feed {
      height: 100dvh; width: 100vw;
      overflow-y: scroll; overflow-x: hidden;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
      scrollbar-width: none;
      touch-action: pan-y; /* let the horizontal gesture layer own X */
      margin: 0 auto;
    }
    #feed::-webkit-scrollbar { display: none; }

    .slide {
      position: relative;
      height: 100dvh; width: 100%;
      scroll-snap-align: start; scroll-snap-stop: always;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; background: #000;
    }

    /* On wide screens (desktop), show a centered phone-width column, not a stranded 9:16 strip */
    @media (min-width: 640px) {
      body { background: #0a0a0a; }
      #feed {
        width: min(430px, calc(100dvh * 9 / 16));
        height: 100dvh;
        border-radius: 18px;
        box-shadow: 0 20px 60px rgba(0,0,0,.6);
        overflow: hidden auto;
      }
    }

    /* The draggable card wrapping the video (X-axis Tinder gesture lives here).
       IMPORTANT: no persistent will-change/transform here — on mobile Safari a <video>
       inside a permanently GPU-promoted layer renders a frozen frame while it plays.
       We only promote the layer WHILE dragging (via .dragging), then drop it. */
    .card {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      touch-action: pan-y;
    }
    .card.dragging { will-change: transform; }
    .card video {
      width: 100%; height: 100%; object-fit: cover; background: #000; display: block;
    }
    .poster {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; background: #111;
    }

    /* Like / Nope stamps that fade in as you drag */
    .stamp {
      position: absolute; top: 15%; padding: 8px 18px;
      font-size: 30px; font-weight: 900; letter-spacing: 2px;
      border: 4px solid; border-radius: 12px; opacity: 0;
      pointer-events: none; text-transform: uppercase;
    }
    .stamp.like { left: 20px; color: var(--like); border-color: var(--like); transform: rotate(-18deg); }
    .stamp.nope { right: 20px; color: var(--nope); border-color: var(--nope); transform: rotate(18deg); }

    /* Temporarily hidden per request — mute toggle, like (♥) and nope (✕) buttons.
       Remove this block to bring them back. Swipe left/right still tracks reactions. */
    .actions, .muteIcon { display: none !important; }

    /* Overlays */
    .meta {
      position: absolute; left: 16px; right: 84px; bottom: calc(28px + env(safe-area-inset-bottom));
      z-index: 3; text-shadow: 0 1px 6px rgba(0,0,0,.7); pointer-events: none;
    }
    .meta h2 { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
    .meta p { font-size: 13px; opacity: .85; }

    .actions {
      position: absolute; right: 12px; bottom: calc(90px + env(safe-area-inset-bottom));
      z-index: 3; display: flex; flex-direction: column; gap: 18px; align-items: center;
    }
    .actions button {
      background: rgba(0,0,0,.35); border: none; color: #fff; width: 52px; height: 52px;
      border-radius: 50%; font-size: 24px; display: grid; place-items: center;
      backdrop-filter: blur(6px); cursor: pointer; transition: transform .1s;
    }
    .actions button:active { transform: scale(.88); }
    .actions .count { font-size: 12px; margin-top: 2px; opacity: .9; }
    .actions .wrap { display: flex; flex-direction: column; align-items: center; }
    button.liked { color: var(--like); }
    button.disliked { color: var(--nope); }

    /* Tap-to-unmute hint / autoplay unlock */
    #tapHint {
      position: fixed; inset: 0; z-index: 50; display: grid; place-items: center;
      background: rgba(0,0,0,.55); backdrop-filter: blur(2px); text-align: center;
    }
    #tapHint .box { padding: 24px 28px; }
    #tapHint h1 { font-size: 22px; margin-bottom: 8px; }
    #tapHint p { font-size: 14px; opacity: .8; line-height: 1.5; }
    #tapHint .btn {
      margin-top: 18px; display: inline-block; padding: 12px 26px; border-radius: 999px;
      background: var(--accent); color: #000; font-weight: 700; font-size: 15px;
    }

    .muteIcon {
      position: absolute; top: calc(14px + env(safe-area-inset-top)); right: 14px; z-index: 4;
      background: rgba(0,0,0,.4); border: none; color: #fff; width: 40px; height: 40px;
      border-radius: 50%; font-size: 18px; backdrop-filter: blur(6px); cursor: pointer;
    }
    .progress {
      position: absolute; top: 0; left: 0; height: 3px; width: 0%;
      background: var(--accent); z-index: 4; transition: width .1s linear;
    }
    #loading { position: fixed; inset: 0; display: grid; place-items: center; z-index: 60; background:#000; }
    #loading[hidden] { display: none !important; pointer-events: none; }
    [hidden] { display: none !important; }
    .spin { width: 34px; height: 34px; border: 3px solid rgba(255,255,255,.25);
      border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading"><div class="spin"></div></div>
  <div id="feed" hidden></div>

  <div id="tapHint" hidden>
    <div class="box">
      <h1>▶ Video Feed</h1>
      <p>Swipe <b>up / down</b> for the next video.<br/>Swipe <b>left / right</b> to react.</p>
      <div class="btn" id="startBtn">Tap to start</div>
    </div>
  </div>

  <script>
    /* ---------- Optional analytics (PostHog). Leave key blank to disable. ---------- */
    const POSTHOG_KEY = "phc_pzPiQEdCEpUXJ76ZpQhPThfSedB5cpqKX2L3iuFdg7Hh"; // Content Engine (project 519119)
    const POSTHOG_HOST = "https://us.i.posthog.com";
    function track(event, props) {
      try { if (window.posthog && POSTHOG_KEY) window.posthog.capture(event, props || {}); } catch (e) {}
      // Always keep a local trace so the POC is debuggable even without PostHog:
      if (!POSTHOG_KEY) console.log("[track]", event, props || {});
    }
    if (POSTHOG_KEY) {
      !function(t,e){var o,n,p,r;e.__SV||(window.posthog=e,e._i=[],e.init=function(i,s,a){function g(t,e){var o=e.split(".");2==o.length&&(t=t[o[0]],e=o[1]),t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments,0)))}}(p=t.createElement("script")).type="text/javascript",p.async=!0,p.src=s.api_host+"/static/array.js",(r=t.getElementsByTagName("script")[0]).parentNode.insertBefore(p,r);var u=e;for(void 0!==a?u=e[a]=[]:a="posthog",u.people=u.people||[],u.toString=function(t){var e="posthog";return"posthog"!==a&&(e+="."+a),t||(e+=" (stub)"),e},u.people.toString=function(){return u.toString(1)+".people (stub)"},o="init capture register register_once unregister opt_out_capturing has_opted_out_capturing opt_in_capturing reset isFeatureEnabled onFeatureFlags getFeatureFlag getFeatureFlagPayload reloadFeatureFlags group updateEarlyAccessFeatureEnrollment getEarlyAccessFeatures getActiveMatchingSurveys getSurveys onSessionId".split(" "),n=0;n<o.length;n++)g(u,o[n]);e._i.push([i,s,a])},e.__SV=1)}(document,window.posthog||[]);
      posthog.init(POSTHOG_KEY, { api_host: POSTHOG_HOST });
    }

    /* ---------- State ---------- */
    const feed = document.getElementById("feed");
    const loading = document.getElementById("loading");
    const tapHint = document.getElementById("tapHint");
    let muted = true;
    let videos = [];
    const reactions = {}; // id -> 'like' | 'dislike'
    const progressFired = {}; // id -> Set of milestones

    /* ---------- Load list ---------- */
    fetch("videos.json?v=" + Date.now())
      .then(r => r.json())
      .then(list => { videos = list; render(); })
      .catch(err => {
        loading.innerHTML = "<p style='opacity:.7;text-align:center;padding:24px'>Could not load videos.json<br>" + err + "</p>";
      });

    function render() {
      feed.innerHTML = "";
      videos.forEach((v, i) => feed.appendChild(buildSlide(v, i)));
      loading.hidden = true;
      feed.hidden = false;
      tapHint.hidden = false;
      observe();
    }

    function buildSlide(v, index) {
      const slide = document.createElement("div");
      slide.className = "slide";
      slide.dataset.index = index;

      const card = document.createElement("div");
      card.className = "card";

      const poster = document.createElement("img");
      poster.className = "poster";
      poster.src = v.poster || "";
      poster.alt = "";

      const video = document.createElement("video");
      // Set ATTRIBUTES (not just properties) — mobile browsers check these for autoplay eligibility.
      video.setAttribute("playsinline", "");
      video.setAttribute("webkit-playsinline", "");
      video.setAttribute("muted", "");
      video.setAttribute("loop", "");
      video.setAttribute("preload", "none");
      video.muted = true; video.loop = true; video.playsInline = true;
      video.poster = v.poster || "";
      video.dataset.src = v.src;        // real src attached on demand

      const bar = document.createElement("div");
      bar.className = "progress";

      const likeStamp = document.createElement("div");
      likeStamp.className = "stamp like"; likeStamp.textContent = "LIKE";
      const nopeStamp = document.createElement("div");
      nopeStamp.className = "stamp nope"; nopeStamp.textContent = "NOPE";

      card.append(poster, video, likeStamp, nopeStamp);

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.innerHTML = `<h2>${escapeHtml(v.title || "")}</h2><p>${escapeHtml(v.caption || "")}</p>`;

      const mute = document.createElement("button");
      mute.className = "muteIcon"; mute.textContent = muted ? "🔇" : "🔊";
      mute.onclick = (e) => { e.stopPropagation(); toggleMute(); };

      const actions = document.createElement("div");
      actions.className = "actions";
      const likeBtn = actionBtn("♥", () => react(v, index, "like"));
      const dislikeBtn = actionBtn("✕", () => react(v, index, "dislike"));
      likeBtn.dataset.role = "like"; dislikeBtn.dataset.role = "dislike";
      actions.append(likeBtn, dislikeBtn);

      slide.append(card, bar, meta, mute, actions);

      attachSwipe(card, v, index, likeStamp, nopeStamp);
      video.addEventListener("timeupdate", () => onProgress(v, video, bar));

      return slide;
    }

    function actionBtn(glyph, onClick) {
      const wrap = document.createElement("div"); wrap.className = "wrap";
      const b = document.createElement("button"); b.textContent = glyph;
      b.onclick = (e) => { e.stopPropagation(); onClick(); };
      const c = document.createElement("div"); c.className = "count"; c.textContent = "";
      wrap.append(b, c);
      return wrap;
    }

    /* ---------- Horizontal Tinder-style gesture (touch + mouse) ---------- */
    function attachSwipe(card, v, index, likeStamp, nopeStamp) {
      let startX = 0, startY = 0, dx = 0, dy = 0, dragging = false, decidedAxis = null;
      const THRESHOLD = 90;

      function begin(x, y) {
        startX = x; startY = y; dx = dy = 0; dragging = true; decidedAxis = null;
        card.style.transition = "none";
      }
      function move(x, y, e) {
        if (!dragging) return;
        dx = x - startX; dy = y - startY;
        if (!decidedAxis && (Math.abs(dx) > 8 || Math.abs(dy) > 8)) {
          decidedAxis = Math.abs(dx) > Math.abs(dy) ? "x" : "y";
        }
        if (decidedAxis === "x") {
          if (e && e.cancelable) e.preventDefault(); // we own this gesture; stop the vertical scroller
          card.classList.add("dragging"); // promote to GPU layer only while actively dragging
          const rot = dx / 18;
          card.style.transform = `translateX(${dx}px) rotate(${rot}deg)`;
          likeStamp.style.opacity = dx > 0 ? Math.min(dx / THRESHOLD, 1) : 0;
          nopeStamp.style.opacity = dx < 0 ? Math.min(-dx / THRESHOLD, 1) : 0;
          return true; // horizontal drag owned
        }
        return false;
      }
      function settle() {
        // Drop the transform and GPU layer so the video composites/repaints normally again.
        card.style.transition = "none";
        card.style.transform = "";
        card.classList.remove("dragging");
      }
      function end() {
        if (!dragging) return;
        dragging = false;
        card.style.transition = "transform .28s ease-out";
        if (decidedAxis === "x" && Math.abs(dx) > THRESHOLD) {
          const dir = dx > 0 ? "like" : "dislike";
          const off = dx > 0 ? window.innerWidth : -window.innerWidth;
          card.style.transform = `translateX(${off}px) rotate(${dx/12}deg)`;
          react(v, index, dir, "swipe");
          setTimeout(settle, 300);
        } else if (decidedAxis === "x") {
          card.style.transform = "";
          setTimeout(settle, 300); // let it spring back, then drop the layer
        } else {
          settle(); // vertical/tap — never promoted, clear immediately
        }
        likeStamp.style.opacity = 0; nopeStamp.style.opacity = 0;
      }

      // Touch
      card.addEventListener("touchstart", (e) => begin(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
      card.addEventListener("touchmove", (e) => move(e.touches[0].clientX, e.touches[0].clientY, e), { passive: false });
      card.addEventListener("touchend", end);

      // Mouse (desktop testing)
      card.addEventListener("mousedown", (e) => { begin(e.clientX, e.clientY); });
      window.addEventListener("mousemove", (e) => { if (dragging) move(e.clientX, e.clientY, null); });
      window.addEventListener("mouseup", () => { if (dragging) end(); });
    }

    /* ---------- Reactions ---------- */
    function react(v, index, type, via) {
      reactions[v.id] = type;
      track(type === "like" ? "swipe_like" : "swipe_dislike",
            { video_id: v.id, position_in_feed: index, via: via || "button" });
      // reflect on buttons
      const slide = feed.children[index];
      if (!slide) return;
      slide.querySelectorAll(".actions button").forEach(b => {
        b.classList.toggle("liked", b.dataset.role === "like" && type === "like");
        b.classList.toggle("disliked", b.dataset.role === "dislike" && type === "dislike");
      });
    }

    /* ---------- Progress / watch tracking ---------- */
    function onProgress(v, video, bar) {
      if (!video.duration) return;
      const pct = video.currentTime / video.duration;
      bar.style.width = (pct * 100) + "%";
      progressFired[v.id] = progressFired[v.id] || new Set();
      [0.25, 0.5, 0.75, 0.95].forEach(m => {
        if (pct >= m && !progressFired[v.id].has(m)) {
          progressFired[v.id].add(m);
          track("video_progress", { video_id: v.id, milestone: Math.round(m * 100) });
          if (m >= 0.95) track("video_completed", { video_id: v.id });
        }
      });
    }

    /* ---------- Autoplay / lazy mount via IntersectionObserver ---------- */
    let currentIndex = -1;
    let started = false; // don't play until the user taps Start (mobile autoplay policy)
    function observe() {
      const io = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          const idx = +entry.target.dataset.index;
          if (entry.isIntersecting && entry.intersectionRatio > 0.6) {
            setActive(idx);
          }
        });
      }, { threshold: [0, 0.6, 1] });
      [...feed.children].forEach(s => io.observe(s));
    }

    function setActive(idx, force) {
      if (!started && !force) return;          // ignore observer until Start tapped
      if (idx === currentIndex && !force) return;
      const prev = currentIndex;
      currentIndex = idx;
      // mount current ±1, unmount the rest
      [...feed.children].forEach((slide, i) => {
        const video = slide.querySelector("video");
        const dist = Math.abs(i - idx);
        if (dist <= 1) mountVideo(video);
        else if (dist > 2) releaseVideo(video);
        if (i === idx) {
          playVideo(video);
          const v = videos[idx];
          if (prev !== idx) track("video_started", { video_id: v.id, position_in_feed: idx });
          if (prev !== -1 && prev !== idx && videos[prev]) {
            const pv = videos[prev];
            const pvid = feed.children[prev].querySelector("video");
            if (!(progressFired[pv.id] && progressFired[pv.id].has(0.95))) {
              track("video_dropped", { video_id: pv.id, drop_off_sec: +(pvid.currentTime || 0).toFixed(1) });
            }
          }
        } else {
          video.pause();
        }
      });
    }

    // Simple, mobile-proven play: keep it muted (autoplay always allowed), just call play().
    // Unmuting is a separate optional step the user triggers, never gated on the play promise.
    function playVideo(video) {
      mountVideo(video);
      video.muted = muted;              // reflect current global mute choice
      const p = video.play();
      if (p && p.catch) p.catch(() => { video.muted = true; video.play().catch(() => {}); });
    }

    function mountVideo(video) {
      if (!video.getAttribute("src") && video.dataset.src) {
        video.setAttribute("src", video.dataset.src);
        video.load();
      }
    }
    // Only tear down videos that are FAR from view (>2 away) — keeping the active
    // and adjacent srcs attached avoids the stall-on-remount bug seen on mobile.
    function unmountVideo(video) {
      video.pause();
    }
    function releaseVideo(video) {
      video.pause();
      if (video.getAttribute("src")) { video.removeAttribute("src"); video.load(); }
    }

    function toggleMute() {
      muted = !muted;
      [...feed.querySelectorAll("video")].forEach(v => v.muted = muted);
      [...feed.querySelectorAll(".muteIcon")].forEach(b => b.textContent = muted ? "🔇" : "🔊");
    }

    function escapeHtml(s) { return (s || "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }

    /* ---------- Start: user gesture unlocks playback ---------- */
    function startFeed() {
      if (started) return;
      started = true;
      tapHint.hidden = true;
      muted = true; // START MUTED — guaranteed to autoplay on every mobile browser. User taps 🔊 for sound.
      [...feed.querySelectorAll(".muteIcon")].forEach(b => b.textContent = "🔇");
      setActive(0, true); // force — bypass the observer guard
    }
    document.getElementById("startBtn").onclick = startFeed;
    tapHint.addEventListener("click", startFeed); // tapping anywhere on the hint starts too
  </script>
</body>
</html>
