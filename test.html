<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Video Test</title>
  <style>
    body { margin:0; background:#111; color:#fff; font-family:-apple-system,sans-serif; }
    video { width:100%; max-width:100vw; height:auto; background:#000; display:block; }
    .log { padding:12px; font-size:13px; line-height:1.6; white-space:pre-wrap; }
    button { margin:10px 12px; padding:10px 16px; font-size:15px; border-radius:8px; border:none; background:#FEAE0E; color:#000; font-weight:700; }
  </style>
</head>
<body>
  <div class="log" id="log">Diagnostic — this is the simplest possible player.\n</div>
  <video id="v" src="videos/sb1.mp4" muted autoplay loop playsinline webkit-playsinline preload="auto" controls></video>
  <button id="play">▶ Force play</button>
  <button id="sound">🔊 Unmute</button>
  <script>
    const v = document.getElementById('v');
    const log = document.getElementById('log');
    function L(m){ log.textContent += m + "\n"; }
    ['loadstart','loadedmetadata','loadeddata','canplay','canplaythrough','playing','waiting','stalled','suspend','error','pause']
      .forEach(ev => v.addEventListener(ev, () => L(ev + (ev==='error'&&v.error ? ' code='+v.error.code : '') + '  t='+v.currentTime.toFixed(1))));
    document.getElementById('play').onclick = () => { v.muted=true; v.play().then(()=>L('play() OK')).catch(e=>L('play() FAIL: '+e.name+' '+e.message)); };
    document.getElementById('sound').onclick = () => { v.muted=false; L('unmuted'); };
    setTimeout(()=>L('after 3s: paused='+v.paused+' readyState='+v.readyState+' networkState='+v.networkState+' t='+v.currentTime.toFixed(1)), 3000);
  </script>
</body>
</html>
